<div class="app-layout">
  @if (mobileMenuOpen()) {
    <button
      type="button"
      class="app-mobile-overlay"
      aria-label="ปิดเมนู"
      (click)="closeMobileMenu()"
    ></button>
  }

  <div class="app-sidebar-slot">
    <app-sidebar [mobileOpen]="mobileMenuOpen()" (mobileClose)="closeMobileMenu()" />
  </div>

  <div class="app-layout-main">
    <app-header (menuToggle)="toggleMobileMenu()" />

    <main class="app-main-content">
      <router-outlet />
    </main>
  </div>
</div>
