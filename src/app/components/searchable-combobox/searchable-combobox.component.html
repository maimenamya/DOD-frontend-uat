<button
  type="button"
  class="app-dropdown-trigger"
  [attr.aria-expanded]="isOpen()"
  aria-haspopup="listbox"
  [disabled]="disabled() || (disableWhenEmpty && options.length === 0)"
  (click)="toggleDropdown($event)"
>
  <span class="app-dropdown-trigger-label">{{ selectedLabel() }}</span>
  <svg class="app-dropdown-chevron" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
    <path
      fill-rule="evenodd"
      d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.24 4.5a.75.75 0 01-1.08 0l-4.24-4.5a.75.75 0 01.02-1.06z"
      clip-rule="evenodd"
    />
  </svg>
</button>
