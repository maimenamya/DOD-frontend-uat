@if (visible()) {
  <div class="app-notification-bell-root">
    <button
      type="button"
      class="app-notification-trigger"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-haspopup="true"
      aria-label="การแจ้งเตือน"
    >
      <svg
        class="app-notification-icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.75"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5" />
        <path d="M9.5 17a2.5 2.5 0 0 0 5 0" />
      </svg>
      @if (unreadCount() > 0) {
        <span class="app-notification-badge" aria-hidden="true">
          {{ unreadCount() > 99 ? '99+' : unreadCount() }}
        </span>
      }
    </button>

    @if (menuOpen()) {
      <div class="app-notification-menu" role="menu" (click)="$event.stopPropagation()">
        <div class="app-notification-menu-header">
          <span class="app-notification-menu-title">การแจ้งเตือน</span>
          @if (unreadCount() > 0) {
            <button type="button" class="app-notification-mark-all" (click)="markAllRead()">
              อ่านทั้งหมด
            </button>
          }
        </div>

        @if (loading() && items().length === 0) {
          <p class="app-notification-empty">กำลังโหลด...</p>
        } @else if (items().length === 0) {
          <p class="app-notification-empty">ยังไม่มีการแจ้งเตือน</p>
        } @else {
          <ul class="app-notification-list">
            @for (item of items(); track item.id) {
              <li>
                <button
                  type="button"
                  class="app-notification-item"
                  [class.app-notification-item--unread]="!item.isRead"
                  role="menuitem"
                  (click)="openItem(item)"
                >
                  <span class="app-notification-item-title">{{ item.title }}</span>
                  <span class="app-notification-item-body">{{ item.body }}</span>
                  <span class="app-notification-item-meta">
                    @if (item.createdByNickname) {
                      <span>จาก {{ item.createdByNickname }}</span>
                      <span aria-hidden="true"> · </span>
                    }
                    <span>{{ item.createdAtLabel }} น.</span>
                  </span>
                </button>
              </li>
            }
          </ul>
        }
      </div>
    }
  </div>
}
