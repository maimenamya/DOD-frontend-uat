<app-modal layout="center" (dismiss)="close()">
  <div class="app-modal-header app-system-guide-header">
    <h2 class="app-modal-title">{{ title }}</h2>
    <button type="button" class="app-btn-ghost" (click)="close()" aria-label="ปิดคู่มือ">✕</button>
  </div>

  <div class="app-system-guide-body">
    <p class="app-system-guide-intro">{{ intro }}</p>

    @for (section of sections; track section.title) {
      <section class="app-system-guide-section">
        <h3 class="app-system-guide-section-title">{{ section.title }}</h3>
        @if (section.intro) {
          <p class="app-system-guide-section-intro">{{ section.intro }}</p>
        }
        <ul class="app-system-guide-list">
          @for (item of section.items; track item.label) {
            <li class="app-system-guide-item">
              <strong class="app-system-guide-item-label">{{ item.label }}</strong>
              <span class="app-system-guide-item-desc">{{ item.description }}</span>
            </li>
          }
        </ul>
      </section>
    }
  </div>

  <div class="app-form-actions app-system-guide-footer">
    <button type="button" class="app-btn-primary" (click)="close()">ปิด</button>
  </div>
</app-modal>
