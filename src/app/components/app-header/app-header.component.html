<header class="app-top-header">
  <button
    type="button"
    class="app-btn-menu app-top-header-menu"
    (click)="onMenuClick()"
    aria-label="เปิดเมนู"
  >
    เมนู
  </button>

  <div class="app-top-header-end">
    <button
      type="button"
      class="app-theme-toggle"
      (click)="toggleTheme()"
      [attr.aria-label]="themeToggleAriaLabel()"
      [title]="themeToggleAriaLabel()"
    >
      @if (uiTheme() === 'dark') {
        <svg
          class="app-theme-toggle-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="4.25" />
          <path
            d="M12 2.75v2.25M12 19v2.25M4.75 4.75l1.6 1.6M17.65 17.65l1.6 1.6M2.75 12h2.25M19 12h2.25M4.75 19.25l1.6-1.6M17.65 6.35l1.6-1.6"
          />
        </svg>
      } @else {
        <svg
          class="app-theme-toggle-icon"
          viewBox="0 0 24 24"
          fill="currentColor"
          aria-hidden="true"
        >
          <path
            d="M21.752 15.002A9.718 9.718 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
          />
        </svg>
      }
    </button>

    <div class="app-profile-menu-root">
      <button
        type="button"
        class="app-profile-trigger"
        (click)="toggleProfileMenu()"
        [attr.aria-expanded]="profileMenuOpen()"
        aria-haspopup="true"
        aria-label="เมนูโปรไฟล์"
      >
        <div class="app-profile-text">
          <span class="app-profile-name">{{ displayNickname() }}</span>
        </div>
        <span class="app-profile-avatar" aria-hidden="true">
          {{ avatarInitial() }}
        </span>
        <svg
          class="app-profile-chevron"
          viewBox="0 0 20 20"
          fill="currentColor"
          aria-hidden="true"
          [class.app-profile-chevron--open]="profileMenuOpen()"
        >
          <path
            fill-rule="evenodd"
            d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.94a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
            clip-rule="evenodd"
          />
        </svg>
      </button>

      @if (profileMenuOpen()) {
        <div class="app-profile-menu" role="menu" (click)="$event.stopPropagation()">
          @if (showBranchPicker()) {
            <div class="app-profile-branch-list" role="group" aria-label="สลับสาขา">
              @for (branch of switchableBranches(); track branch.shopId) {
                <button
                  type="button"
                  class="app-profile-branch-option"
                  [disabled]="switchingBranch()"
                  (click)="selectBranch(branch.shopId)"
                >
                  {{ branchLabel(branch) }}
                </button>
              }
            </div>
          }

          <button type="button" class="app-profile-menu-item" role="menuitem" (click)="goToProfile()">
            แก้ไขโปรไฟล์
          </button>
        </div>
      }
    </div>
  </div>
</header>
