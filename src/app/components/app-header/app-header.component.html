<header class="app-top-header">
  <button
    type="button"
    class="app-btn-menu app-top-header-menu"
    (click)="onMenuClick()"
    aria-label="เปิดเมนู"
  >
    เมนู
  </button>

  <div class="app-top-header-end">
    <div class="app-profile-text">
      <span class="app-profile-name">{{ displayNickname() }}</span>
      <span class="app-profile-role">{{ roleLabel(user()?.role ?? '') }}</span>
    </div>
    <button
      type="button"
      class="app-profile-avatar-btn"
      (click)="goToProfile()"
      aria-label="แก้ไขโปรไฟล์"
      title="แก้ไขโปรไฟล์"
    >
      <span class="app-profile-avatar" aria-hidden="true">
        {{ avatarInitial() }}
      </span>
    </button>
  </div>
</header>
