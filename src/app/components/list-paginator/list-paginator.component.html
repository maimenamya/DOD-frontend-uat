<div class="app-list-paginator">
  <p class="app-list-paginator-summary">
    @if (total() === 0) {
      ไม่มีรายการ
    } @else {
      แสดง {{ rangeStart() }}–{{ rangeEnd() }} จาก {{ total() }} รายการ
    }
  </p>
  <div class="app-list-paginator-controls">
    <label class="app-list-paginator-limit">
      <span class="app-list-paginator-limit-label">ต่อหน้า</span>
      <app-custom-dropdown
        class="app-list-paginator-select"
        [options]="pageSizeDropdownOptions"
        [ngModel]="limit()"
        (ngModelChange)="onLimitChange($event)"
      />
    </label>
    <div class="app-list-paginator-nav" aria-label="เปลี่ยนหน้า">
      <button
        type="button"
        class="app-btn-secondary-sm app-list-paginator-nav-btn"
        [disabled]="!canGoPrev()"
        (click)="goPrev()"
      >
        ก่อนหน้า
      </button>
      <span class="app-list-paginator-page">หน้า {{ page() }} / {{ totalPages() }}</span>
      <button
        type="button"
        class="app-btn-secondary-sm app-list-paginator-nav-btn"
        [disabled]="!canGoNext()"
        (click)="goNext()"
      >
        ถัดไป
      </button>
    </div>
  </div>
</div>
