<aside
  class="app-sidebar"
  [class.app-sidebar--closed]="!mobileOpen()"
  [class.app-sidebar--open]="mobileOpen()"
>
  <div class="app-sidebar-brand">
    <p class="app-sidebar-brand-label">DOD System</p>
    <p class="app-sidebar-brand-title">for fun</p>
  </div>

  <nav class="app-sidebar-nav">
    <a
      routerLink="/dashboard"
      routerLinkActive="app-sidebar-link-active"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="collapseAllSubmenus(); mobileClose.emit()"
      class="app-sidebar-link"
    >
      <span class="app-sidebar-icon" aria-hidden="true">📊</span>
      แดชบอร์ด
    </a>

    @if (showManagementLinks) {
      <a
        routerLink="/dashboard/open-table"
        routerLinkActive="app-sidebar-link-active"
        (click)="collapseAllSubmenus(); mobileClose.emit()"
        class="app-sidebar-link"
      >
        <span class="app-sidebar-icon" aria-hidden="true">🪑</span>
        เปิดโต๊ะ
      </a>

      <a
        routerLink="/dashboard/pr-tag-operations"
        routerLinkActive="app-sidebar-link-active"
        (click)="collapseAllSubmenus(); mobileClose.emit()"
        class="app-sidebar-link"
      >
        <span class="app-sidebar-icon" aria-hidden="true">🏷️</span>
        จัดการ tag
      </a>

      @for (group of navGroups; track group.id) {
        <div class="app-sidebar-group">
          <button
            type="button"
            class="app-sidebar-group-toggle"
            [attr.aria-expanded]="isGroupExpanded(group.id)"
            (click)="toggleSubmenu(group.id)"
          >
            <span class="app-sidebar-icon" aria-hidden="true">{{ group.icon }}</span>
            <span class="app-sidebar-group-label">{{ group.label }}</span>
            <span class="app-sidebar-group-chevron" aria-hidden="true">
              {{ isGroupExpanded(group.id) ? '▾' : '▸' }}
            </span>
          </button>
          @if (isGroupExpanded(group.id)) {
            <div class="app-sidebar-subnav">
              @for (item of group.children; track item.path) {
                <a
                  [routerLink]="item.path"
                  routerLinkActive="app-sidebar-link-active"
                  (click)="mobileClose.emit()"
                  class="app-sidebar-link app-sidebar-sublink"
                >
                  {{ item.label }}
                </a>
              }
            </div>
          }
        </div>
      }
    }
  </nav>

  <div class="app-sidebar-footer">
    <button type="button" class="app-sidebar-logout" (click)="logout(); mobileClose.emit()">
      <span class="app-sidebar-icon" aria-hidden="true">🚪</span>
      ออกจากระบบ
    </button>
  </div>
</aside>
