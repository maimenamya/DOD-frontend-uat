<div class="app-page">
  <div class="app-page-header">
    <div>
      <h1 class="app-page-title">เครื่องดื่ม</h1>
      <p class="app-page-subtitle">ข้อมูลจากตาราง Master Drink</p>
    </div>
  </div>

  @if (loading()) {
    <div class="app-skeleton-list" aria-busy="true" aria-label="กำลังโหลดข้อมูล">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
  } @else if (error()) {
    <div class="app-alert-error">{{ error() }}</div>
  } @else {
    <div class="app-grid-stats">
      @for (item of beverages(); track item.id) {
        <article class="app-card">
          <p class="app-card-kicker">ประเภทเครื่องดื่ม</p>
          <h3 class="app-card-title app-card-title-spaced">{{ item.name }}</h3>
          <p class="app-page-subtitle app-page-subtitle-tight">ราคา: {{ item.price }} บาท</p>
        </article>
      }
    </div>
  }

  <p class="app-loading-text">ทั้งหมด {{ total() }} รายการ</p>
</div>
