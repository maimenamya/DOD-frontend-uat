<div class="app-page accept-privacy-page">
  <div class="app-page-header">
    <div>
      <h1 class="app-page-title">{{ policyTitle }}</h1>
      <p class="app-page-subtitle">
        กรุณาอ่านและยอมรับก่อนใช้งานระบบ D-rink (เวอร์ชัน {{ policyVersion }})
      </p>
    </div>
  </div>

  <section class="app-card accept-privacy-card">
    <div
      #policyBody
      class="accept-privacy-card__body app-scroll-region"
      (scroll)="onPolicyScroll()"
    >
      @for (section of sections; track section.heading) {
        <div class="accept-privacy-section">
          <h2 class="accept-privacy-section__heading">{{ section.heading }}</h2>
          <p class="accept-privacy-section__body">{{ section.body }}</p>
        </div>
      }
    </div>

    <form class="accept-privacy-card__footer" (ngSubmit)="submit()">
      <label
        class="accept-privacy-consent"
        [class.accept-privacy-consent--locked]="!scrolledToEnd()"
      >
        <span class="accept-privacy-check-control">
          <input
            type="checkbox"
            class="accept-privacy-check-input"
            [ngModel]="agreed()"
            (ngModelChange)="agreed.set($event)"
            name="agreed"
            [disabled]="!scrolledToEnd()"
          />
          <span class="accept-privacy-check-indicator" aria-hidden="true"></span>
        </span>
        <span class="accept-privacy-check-label">{{ checkboxLabel }}</span>
      </label>

      <button
        type="submit"
        class="app-btn app-btn-primary"
        [disabled]="submitting() || !agreed() || !scrolledToEnd()"
      >
        @if (submitting()) {
          กำลังบันทึก…
        } @else {
          ยอมรับและเริ่มใช้งาน
        }
      </button>
    </form>
  </section>
</div>
