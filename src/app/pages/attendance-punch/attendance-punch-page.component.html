<div class="flex min-h-screen flex-col items-center justify-center bg-surface px-4 py-8">
  <div class="w-full max-w-md rounded-card border border-theme-border bg-surface-elevated p-6 text-center shadow-lg">
    @if (loading()) {
      <p class="text-text-secondary">กำลังบันทึกเวลา...</p>
    } @else if (error()) {
      <h1 class="text-xl font-semibold text-text-primary">ลงเวลาไม่สำเร็จ</h1>
      <p class="mt-3 text-sm text-red-400" role="alert">{{ error() }}</p>
      <button type="button" class="app-btn-primary mt-6 w-full" (click)="goHome()">
        กลับหน้าหลัก
      </button>
    } @else if (result()) {
      <p class="text-sm text-text-secondary">{{ result()!.employeeNickname }}</p>
      <h1 class="mt-1 text-2xl font-bold text-theme-accent-strong">{{ result()!.punchTypeLabel }}</h1>
      <p class="mt-4 text-lg text-text-primary">{{ result()!.punchedAtLabel }} น.</p>
      <p class="mt-2 text-sm text-text-secondary">
        สถานะ: {{ result()!.attendanceStatusLabel }}
      </p>
      <button type="button" class="app-btn-primary mt-6 w-full" (click)="goHome()">
        กลับหน้าหลัก
      </button>
    }
  </div>
</div>
