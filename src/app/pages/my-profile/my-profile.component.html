<div class="app-page">
  <div class="app-page-header">
    <div>
      <h1 class="app-page-title">โปรไฟล์ของฉัน</h1>
      <p class="app-page-subtitle">
        บัญชี <span class="app-page-subtitle-accent">{{ user?.employeeId }}</span>
        · ตำแหน่ง <span class="app-page-subtitle-strong">{{ user?.roleDisplayNameTh }}</span>
        · {{ user?.shop?.name }}
      </p>
    </div>
  </div>

  <section class="app-card app-profile-card">
    <p class="app-profile-hint">
      แก้ไขข้อมูลส่วนตัวของคุณได้ที่นี่ ไม่สามารถเปลี่ยนตำแหน่งหรือร้านจากหน้านี้
    </p>
    <form class="app-form-stack" [formGroup]="form" (ngSubmit)="submit()">
      <div class="app-form-group">
        <label class="app-label">ชื่อเล่น</label>
        <input type="text" formControlName="nickname" class="app-input" />
      </div>
      <div class="app-form-group">
        <label class="app-label">อีเมล</label>
        <input type="email" formControlName="email" class="app-input" />
      </div>
      <div class="app-form-group">
        <label class="app-label">รหัสผ่านใหม่ (ไม่บังคับ)</label>
        <input
          type="password"
          formControlName="password"
          class="app-input"
          placeholder="เว้นว่างหากไม่ต้องการเปลี่ยน"
        />
      </div>
      <div class="app-form-actions app-form-actions-top">
        <button type="submit" class="app-btn-primary" [disabled]="submitting()">
          {{ submitting() ? 'กำลังบันทึก...' : 'บันทึกโปรไฟล์' }}
        </button>
      </div>
    </form>
  </section>
</div>
