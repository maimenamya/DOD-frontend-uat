<section class="space-y-5">
  <div>
    <h2 class="text-xl font-bold tracking-tight text-slate-900">Employee directory</h2>
    <p class="text-sm text-slate-600 mt-1">ข้อมูลพนักงานจาก API — พร็อกซีไปยัง Backend ที่พอร์ต 3000</p>
  </div>

  @if (loading()) {
    <div class="flex flex-col items-center justify-center rounded-2xl border border-dashed border-slate-200 bg-white/60 py-20 shadow-inner">
      <div class="h-10 w-10 animate-spin rounded-full border-2 border-indigo-200 border-t-indigo-600"></div>
      <p class="mt-4 text-sm font-medium text-slate-600">กำลังโหลดรายชื่อพนักงาน...</p>
    </div>
  } @else if (error()) {
    <div class="rounded-2xl border border-red-200 bg-red-50 px-6 py-5 text-red-800 shadow-sm">
      <p class="font-semibold">เกิดข้อผิดพลาด</p>
      <p class="mt-1 text-sm">{{ error() }}</p>
    </div>
  } @else {
    <app-employee-table [employees]="employees()" />
  }
</section>
