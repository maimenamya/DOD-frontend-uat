<div class="app-page">
  <div class="app-page-header">
    <div>
      <h1 class="app-page-title">Employee directory</h1>
      <p class="app-page-subtitle">ข้อมูลพนักงานจาก API — พร็อกซีไปยัง Backend ที่พอร์ต 3000</p>
    </div>
  </div>

  @if (loading()) {
    <app-master-list-skeleton [toolbar]="false" [columns]="5" ariaLabel="กำลังโหลดรายชื่อพนักงาน" />
  } @else if (error()) {
    <div class="app-alert-error">
      <p class="app-alert-heading">เกิดข้อผิดพลาด</p>
      <p class="app-alert-body">{{ error() }}</p>
    </div>
  } @else {
    <app-employee-table [employees]="employees()" />
  }
</div>
