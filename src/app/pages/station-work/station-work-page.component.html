<div class="app-page">
  <div class="app-page-header">
    <div>
      <h1 class="app-page-title">คิวงาน</h1>
    </div>
  </div>

  @if (showTabs()) {
    <div class="app-segmented-control station-work-tabs" role="tablist" aria-label="ประเภทคิวงาน">
      @for (tab of tabs(); track tab) {
        <button
          type="button"
          class="app-segmented-chip"
          role="tab"
          [class.app-segmented-chip-active]="activeTab() === tab"
          [attr.aria-selected]="activeTab() === tab"
          (click)="selectTab(tab)"
        >
          {{ tabLabels[tab] }}
        </button>
      }
    </div>
  }

  @switch (activeTab()) {
    @case ('food') {
      <div class="station-work-panel">
        <app-station-queue-page [embedded]="true" kind="FOOD" />
      </div>
    }
    @case ('drink') {
      <div class="station-work-panel">
        <app-station-queue-page [embedded]="true" kind="DRINK" />
      </div>
    }
    @case ('pickup') {
      <div class="station-work-panel">
        <app-service-pickup-page [embedded]="true" />
      </div>
    }
  }
</div>
