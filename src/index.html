<!doctype html>
<html lang="th" translate="no" class="notranslate" data-theme="dark">
<head>
  <meta charset="utf-8">
  <title>D-rink</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="google" content="notranslate">
  <meta name="theme-color" content="#10141d" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#dceeeb" media="(prefers-color-scheme: light)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="D-rink">
  <script src="pwa-bootstrap.js"></script>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
  <link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-theme="dark" class="dark-theme notranslate" translate="no">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('dod-ui-theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
          document.body.setAttribute('data-theme', t);
          document.body.classList.toggle('dark-theme', t === 'dark');
        }
      } catch (e) {}
    })();
  </script>
  <app-root></app-root>
  <div id="app-dropdown-overlay-root" class="app-dropdown-overlay-root" aria-hidden="true"></div>
</body>
</html>
